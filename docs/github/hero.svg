  </text>
  <rect x="264" y="404" width="142" height="48" rx="24" fill="#E4F1FF"/>
  <text x="335" y="435" text-anchor="middle" fill="#134074" font-family="Segoe UI, Arial, sans-serif" font-size="20" font-weight="700">
