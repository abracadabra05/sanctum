  </text>

  <g filter="url(#shadow)">
    <rect x="744" y="104" width="390" height="438" rx="34" fill="url(#panel)"/>
    <rect x="782" y="140" width="314" height="104" rx="28" fill="url(#accent)"/>
    <text x="818" y="182" fill="#F8FBFF" font-family="Segoe UI, Arial, sans-serif" font-size="18" font-weight="700">
