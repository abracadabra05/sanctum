  </text>
  <rect x="422" y="404" width="164" height="48" rx="24" fill="#E4F1FF"/>
  <text x="504" y="435" text-anchor="middle" fill="#134074" font-family="Segoe UI, Arial, sans-serif" font-size="20" font-weight="700">
    JSON backup
  </text>

  <text x="96" y="520" fill="#0F172A" font-family="Segoe UI, Arial, sans-serif" font-size="22" font-weight="700">
