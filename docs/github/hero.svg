    </text>

    <rect x="944" y="366" width="152" height="132" rx="24" fill="#EDF7EE"/>
    <text x="972" y="404" fill="#12805C" font-family="Segoe UI, Arial, sans-serif" font-size="16" font-weight="700">
      HABITS
    </text>
    <text x="972" y="448" fill="#0F172A" font-family="Segoe UI, Arial, sans-serif" font-size="34" font-weight="700">
