  </text>
  <text x="96" y="348" fill="#334155" font-family="Segoe UI, Arial, sans-serif" font-size="30" font-weight="500">
    in one calm, offline-friendly mobile workflow.
  </text>

  <rect x="96" y="404" width="152" height="48" rx="24" fill="#0F7AE5"/>
  <text x="172" y="435" text-anchor="middle" fill="#F8FBFF" font-family="Segoe UI, Arial, sans-serif" font-size="20" font-weight="700">
