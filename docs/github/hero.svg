    </text>

    <rect x="782" y="268" width="314" height="82" rx="24" fill="#F8FBFF" stroke="#D3E8FF" stroke-width="2"/>
    <text x="812" y="304" fill="#0F172A" font-family="Segoe UI, Arial, sans-serif" font-size="16" font-weight="700">
